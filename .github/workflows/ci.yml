name: CI

on:
  push:
    branches: [main, phase*]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Install dependencies
        run: |
          cd cli
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd cli
          pytest trailpolicy/tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: cli/test-results.xml

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform fmt check
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: Validate phase0-bootstrap
        run: |
          cd terraform/phase0-bootstrap
          terraform init -backend=false
          terraform validate

      - name: Validate phase1-foundation
        run: |
          cd terraform/phase1-foundation
          terraform init -backend=false
          terraform validate

      - name: Validate phase2-query-layer
        run: |
          cd terraform/phase2-query-layer
          terraform init -backend=false
          terraform validate

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check shell scripts
        run: |
          bash -n scripts/build-lambda.sh

      - name: Check for debug prints
        run: |
          ! grep -rn "breakpoint()\|import pdb\|pdb.set_trace" cli/trailpolicy/ --include="*.py" || exit 1
